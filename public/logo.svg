<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Aurora gradient -->
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c52ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3ca0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5aaa;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Dark bg gradient -->
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#080810"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg)" />
  
  <!-- Subtle aurora glow ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#aurora)" stroke-width="3" opacity="0.25"/>

  <!-- Stylized "t" letter -->
  <g filter="url(#glow)">
    <!-- Vertical stem - purple to blue gradient -->
    <rect x="196" y="95" width="28" height="200" rx="14" fill="url(#aurora)"/>
    
    <!-- Crossbar - blue -->
    <rect x="120" y="130" width="172" height="24" rx="12" fill="#3ca0ff" opacity="0.95"/>
    
    <!-- Bottom hook - pink to purple -->
    <path d="M 196 295 Q 196 370 256 370 Q 316 370 316 295" 
          stroke="url(#aurora)" stroke-width="28" fill="none" 
          stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Dot accent - pink -->
    <circle cx="256" cy="405" r="14" fill="#ff5aaa" opacity="0.9"/>
  </g>
  
  <!-- Aurora shimmer lines -->
  <path d="M 80 380 Q 150 320 256 300 Q 362 280 432 240" 
        stroke="url(#aurora)" stroke-width="4" fill="none" 
        opacity="0.2" stroke-linecap="round"/>
  <path d="M 60 420 Q 160 350 256 330 Q 352 310 452 270" 
        stroke="#3ca0ff" stroke-width="3" fill="none" 
        opacity="0.15" stroke-linecap="round"/>
</svg>
