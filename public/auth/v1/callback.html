<!DOCTYPE html>
<html>
<head><title>Auth callback</title></head>
<body>
<script>
  // Just pass the auth code to the main app via query string and redirect
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var state = params.get('state');
  var error = params.get('error');

  if (error) {
    window.location.href = '/?auth_error=' + encodeURIComponent(error);
  } else if (code) {
    // Pass code to React app via hash or just redirect with the code in URL
    window.location.href = '/?code=' + encodeURIComponent(code) + (state ? '&state=' + encodeURIComponent(state) : '');
  } else {
    window.location.href = '/';
  }
</script>
<p style="font-family:sans-serif;padding:2rem;text-align:center;color:#888">Authenticating...</p>
</body>
</html>
